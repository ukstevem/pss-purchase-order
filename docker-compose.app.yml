services:
  purchase-order:
    image: ghcr.io/ukstevem/pss-purchase-order:${IMAGE_TAG:-latest}
    container_name: purchase-order
    restart: unless-stopped
    # Portainer Stack > Environment variables (or shell `export` for
    # local docker compose). Required at runtime:
    #   NEXT_PUBLIC_SUPABASE_URL
    #   NEXT_PUBLIC_SUPABASE_ANON_KEY
    #   NEXT_PUBLIC_APP_URL
    #   SUPABASE_URL
    #   SUPABASE_SECRET_KEY
    # The NEXT_PUBLIC_* values are also baked into the client bundle at
    # build time (from platform-portal/.env when ./build.sh ran); passing
    # them again at runtime is harmless and lets server-side code that
    # imports @platform/supabase work too.
    environment:
      # Prefer A records — v6-first resolution breaks outbound fetch when
      # the network has no v6 route (seen with NetExtender DNS interception)
      NODE_OPTIONS: --dns-result-order=ipv4first
      PORT: 3017
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      # Stage-2 write gate — leave unset for read-only; set to "1" at
      # write-cutover (runtime flag, restart applies it; no rebuild)
      PO_WRITES_ENABLED: ${PO_WRITES_ENABLED:-}
      # PDF pipeline (9bq.31): pss-pdf-service on the Orin + doc-service filing
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://10.0.0.74:8017}
      PDF_SERVICE_API_KEY: ${PDF_SERVICE_API_KEY:-}
      DOC_SERVICE_URL: ${DOC_SERVICE_URL:-http://10.0.0.74:3000}
      DOC_SERVICE_API_KEY: ${DOC_SERVICE_API_KEY:-}
      # Browser-reachable doc-service base for filed-document links (9bq.31)
      DOC_SERVICE_PUBLIC_URL: ${DOC_SERVICE_PUBLIC_URL:-}
      PO_ISO_DESCRIPTION_ID: ${PO_ISO_DESCRIPTION_ID:-53}
      # Outlook drafts (9bq.7) — drafts only, never sent; OFF unless
      # EMAIL_DRAFT_ON_PO=1 and MS_* creds provided
      EMAIL_DRAFT_ON_PO: ${EMAIL_DRAFT_ON_PO:-}
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_OUTLOOK_MAILBOX: ${MS_OUTLOOK_MAILBOX:-}
    ports:
      - "3017:3017"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3017/purchase-order/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# No external network: the gateway reaches standalone apps via host-IP:port
# (production.conf `set $purchase_order_backend http://10.0.0.75:3017`), and
# platform_net does not exist on the Pi despite the template folklore.
