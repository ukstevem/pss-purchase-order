# Local test stack — builds the image on the host (amd64 Docker Desktop),
# exposes the app on port 3017, and does NOT join platform_net. For Pi
# deployment use docker-compose.app.yml instead.
#
# Two modes, chosen by --env-file (run from the repo root):
#
#   LIVE Supabase, read-only testing (Azure sign-in):
#     docker compose --env-file ../platform-portal/.env -f docker-compose.local.yml up --build -d
#
#   LOCAL Supabase clone at 10.0.0.85 — stage-2 write development (bead 9bq.22;
#   local/.env is git-ignored and sets NEXT_PUBLIC_ALLOW_PASSWORD_AUTH=1 for
#   the email/password dev sign-in, since the clone has no Azure OAuth):
#     docker compose --env-file ./local/.env -f docker-compose.local.yml up --build -d
#
#   open http://localhost:3017/purchase-order/
#
# NEXT_PUBLIC_APP_URL is pinned to localhost so the OAuth redirect
# returns here rather than to the gateway.

services:
  purchase-order:
    build:
      context: ./app
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: http://localhost:3017
        NEXT_PUBLIC_ALLOW_PASSWORD_AUTH: ${NEXT_PUBLIC_ALLOW_PASSWORD_AUTH:-}
    container_name: purchase-order-local
    restart: unless-stopped
    environment:
      PORT: 3017
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3017
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      # Stage-2 write gate — runtime, set in local/.env for clone dev (9bq.24)
      PO_WRITES_ENABLED: ${PO_WRITES_ENABLED:-}
      # PDF pipeline (9bq.31) — host.docker.internal reaches services on the
      # dev machine (pdf-service container :8017; local doc-service instance)
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://host.docker.internal:8017}
      PDF_SERVICE_API_KEY: ${PDF_SERVICE_API_KEY:-localdev}
      DOC_SERVICE_URL: ${DOC_SERVICE_URL:-}
      DOC_SERVICE_API_KEY: ${DOC_SERVICE_API_KEY:-}
      # Browser-reachable doc-service base for filed-document links (9bq.31)
      DOC_SERVICE_PUBLIC_URL: ${DOC_SERVICE_PUBLIC_URL:-}
      PO_ISO_DESCRIPTION_ID: ${PO_ISO_DESCRIPTION_ID:-53}
      # Outlook drafts (9bq.7) — drafts only, never sent; OFF unless
      # EMAIL_DRAFT_ON_PO=1 and MS_* creds provided
      EMAIL_DRAFT_ON_PO: ${EMAIL_DRAFT_ON_PO:-}
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_OUTLOOK_MAILBOX: ${MS_OUTLOOK_MAILBOX:-}
    ports:
      - "3017:3017"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3017/purchase-order/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
